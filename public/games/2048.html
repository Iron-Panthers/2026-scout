<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>2048</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #faf8ef;
    font-family: "Clear Sans", "Helvetica Neue", Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px;
    min-height: 100vh;
    touch-action: none;
  }
  header {
    width: 100%;
    max-width: 340px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  h1 { font-size: 2.4rem; font-weight: 800; color: #776e65; }
  .scores { display: flex; gap: 8px; }
  .score-box {
    background: #bbada0;
    color: #fff;
    border-radius: 4px;
    padding: 4px 12px;
    text-align: center;
    min-width: 64px;
  }
  .score-box .label { font-size: 0.6rem; text-transform: uppercase; font-weight: 700; }
  .score-box .value { font-size: 1.1rem; font-weight: 700; }
  .new-game-btn {
    background: #8f7a66;
    color: #f9f6f2;
    border: none;
    border-radius: 4px;
    padding: 8px 14px;
    font-size: 0.85rem;
    font-weight: 700;
    cursor: pointer;
  }
  .new-game-btn:hover { background: #7a6858; }

  .grid-container {
    background: #bbada0;
    border-radius: 8px;
    padding: 8px;
    width: 100%;
    max-width: 340px;
    position: relative;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }
  .cell {
    aspect-ratio: 1;
    background: rgba(238,228,218,0.35);
    border-radius: 4px;
  }
  .tile {
    aspect-ratio: 1;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    font-size: 1.6rem;
    transition: background 0.1s;
    position: relative;
  }

  /* Tile colours */
  .t2    { background:#eee4da; color:#776e65; }
  .t4    { background:#ede0c8; color:#776e65; }
  .t8    { background:#f2b179; color:#f9f6f2; }
  .t16   { background:#f59563; color:#f9f6f2; }
  .t32   { background:#f67c5f; color:#f9f6f2; }
  .t64   { background:#f65e3b; color:#f9f6f2; }
  .t128  { background:#edcf72; color:#f9f6f2; font-size:1.3rem; }
  .t256  { background:#edcc61; color:#f9f6f2; font-size:1.3rem; }
  .t512  { background:#edc850; color:#f9f6f2; font-size:1.3rem; }
  .t1024 { background:#edc53f; color:#f9f6f2; font-size:1rem; }
  .t2048 { background:#edc22e; color:#f9f6f2; font-size:1rem; }
  .tsuper{ background:#3c3a32; color:#f9f6f2; font-size:0.85rem; }

  /* Overlay */
  .overlay {
    display: none;
    position: absolute;
    inset: 0;
    background: rgba(238,228,218,0.73);
    border-radius: 8px;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    z-index: 10;
  }
  .overlay.show { display: flex; }
  .overlay-title { font-size: 2rem; font-weight: 800; color: #776e65; }
  .overlay button {
    background: #8f7a66;
    color: #f9f6f2;
    border: none;
    border-radius: 4px;
    padding: 10px 20px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
  }
</style>
</head>
<body>
<header>
  <h1>2048</h1>
  <div class="scores">
    <div class="score-box">
      <div class="label">Score</div>
      <div class="value" id="score">0</div>
    </div>
    <div class="score-box">
      <div class="label">Best</div>
      <div class="value" id="best">0</div>
    </div>
  </div>
  <button class="new-game-btn" onclick="newGame()">New Game</button>
</header>

<div class="grid-container">
  <div class="grid" id="grid"></div>
  <div class="overlay" id="overlay">
    <div class="overlay-title" id="overlay-title"></div>
    <button onclick="newGame()">Try Again</button>
  </div>
</div>

<script>
  let board, score, best, moved;
  best = parseInt(localStorage.getItem("2048best") || "0");

  function newGame() {
    board = Array.from({length:4}, () => Array(4).fill(0));
    score = 0;
    document.getElementById("overlay").classList.remove("show");
    addTile(); addTile();
    render();
  }

  function addTile() {
    const empty = [];
    for (let r=0; r<4; r++) for (let c=0; c<4; c++) if (!board[r][c]) empty.push([r,c]);
    if (!empty.length) return;
    const [r,c] = empty[Math.floor(Math.random()*empty.length)];
    board[r][c] = Math.random() < 0.9 ? 2 : 4;
  }

  function slideRow(row) {
    let arr = row.filter(v=>v);
    let gained = 0;
    for (let i=0; i<arr.length-1; i++) {
      if (arr[i] === arr[i+1]) {
        arr[i] *= 2;
        gained += arr[i];
        arr.splice(i+1, 1);
      }
    }
    while (arr.length < 4) arr.push(0);
    return { row: arr, gained };
  }

  function move(dir) {
    let changed = false;
    let totalGained = 0;

    const rotate = m => m[0].map((_,c) => m.map(r=>r[c]).reverse());
    let b = board.map(r=>[...r]);

    // Normalise: always operate left
    let times = {left:0, right:2, up:3, down:1}[dir];
    for (let t=0; t<times; t++) b = rotate(b);

    for (let r=0; r<4; r++) {
      const orig = [...b[r]];
      const {row, gained} = slideRow(b[r]);
      b[r] = row;
      totalGained += gained;
      if (orig.join() !== row.join()) changed = true;
    }

    // Un-rotate
    let back = {left:0, right:2, up:1, down:3}[dir];
    for (let t=0; t<back; t++) b = rotate(b);

    if (changed) {
      board = b;
      score += totalGained;
      if (score > best) { best = score; localStorage.setItem("2048best", best); }
      addTile();
      render();
      checkEnd();
    }
  }

  function checkEnd() {
    for (let r=0; r<4; r++) for (let c=0; c<4; c++) {
      if (board[r][c] === 2048) { showOverlay("You Win!"); return; }
    }
    for (let r=0; r<4; r++) for (let c=0; c<4; c++) {
      if (!board[r][c]) return;
      if (c<3 && board[r][c]===board[r][c+1]) return;
      if (r<3 && board[r][c]===board[r+1][c]) return;
    }
    showOverlay("Game Over");
  }

  function showOverlay(msg) {
    document.getElementById("overlay-title").textContent = msg;
    document.getElementById("overlay").classList.add("show");
  }

  function tileClass(v) {
    if (!v) return "";
    if (v <= 2048) return "tile t"+v;
    return "tile tsuper";
  }

  function render() {
    const grid = document.getElementById("grid");
    grid.innerHTML = "";
    for (let r=0; r<4; r++) for (let c=0; c<4; c++) {
      const v = board[r][c];
      const el = document.createElement("div");
      el.className = v ? tileClass(v) : "cell";
      if (v) el.textContent = v;
      grid.appendChild(el);
    }
    document.getElementById("score").textContent = score;
    document.getElementById("best").textContent = best;
  }

  // Keyboard
  document.addEventListener("keydown", e => {
    const map = {ArrowLeft:"left",ArrowRight:"right",ArrowUp:"up",ArrowDown:"down"};
    if (map[e.key]) { e.preventDefault(); move(map[e.key]); }
  });

  // Touch/swipe
  let tx, ty;
  document.addEventListener("touchstart", e => {
    tx = e.touches[0].clientX;
    ty = e.touches[0].clientY;
  }, {passive:true});
  document.addEventListener("touchend", e => {
    if (tx == null) return;
    const dx = e.changedTouches[0].clientX - tx;
    const dy = e.changedTouches[0].clientY - ty;
    tx = ty = null;
    if (Math.max(Math.abs(dx),Math.abs(dy)) < 20) return;
    if (Math.abs(dx) > Math.abs(dy)) move(dx>0?"right":"left");
    else move(dy>0?"down":"up");
  }, {passive:true});

  newGame();
</script>
</body>
</html>
